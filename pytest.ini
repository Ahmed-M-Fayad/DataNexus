[pytest]
# Tell pytest where to find tests
testpaths = tests

# Make src/ importable without installing the package
# (equivalent to PYTHONPATH=.)
pythonpath = .

# Show full diffs on assertion failures
addopts = -v --tb=short

# Log level during tests — INFO shows ValidationEngine's step-by-step log
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s